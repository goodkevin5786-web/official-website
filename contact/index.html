<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

      name="description"
      content="合作、商業企劃、活動邀約，歡迎透過電子郵件 goodwork0706@gmail.com 與 GoodSon Studio 聯繫。"
    />
    <meta name="keywords" content="乖娛樂, 乖兒子, 阿乖, 乖, 小乖, 乖哥, GoodSon, 合作邀約, 商業企劃, 聯絡" />
    <link rel="canonical" href="https://goodson0706.com/contact/" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="theme-color" content="#0a1420" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="GoodSon Studio" />
    <meta property="og:title" content="聯絡我們｜GoodSon Studio 乖娛樂工作室" />
    <meta
      property="og:description"
      content="合作、商業企劃、活動邀約，歡迎透過電子郵件與 GoodSon Studio 聯繫。"
    />
    <meta property="og:url" content="https://goodson0706.com/contact/" />
    <meta property="og:image" content="https://goodson0706.com/assets/og-cover.png" />
    <meta property="og:locale" content="zh_TW" />
    <meta property="og:locale:alternate" content="en_US" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="聯絡我們｜GoodSon Studio" />
    <meta
      name="twitter:description"
      content="合作、商業企劃、活動邀約，歡迎來信聯繫。"
    />
    <meta name="twitter:image" content="https://goodson0706.com/assets/og-cover.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="../assets/logo.ico" />
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body
    data-page="contact"
    data-root-path="../"
    data-settings-path="../setting.json"
  >
    <header class="site-header">
      <a id="brand-link" class="brand" href="./"></a>
      <div class="site-header-actions">
        <button
          id="menu-toggle"
          class="menu-toggle"
          type="button"
          data-action="toggle-menu"
          aria-label=""
          aria-expanded="false"
          aria-controls="nav-list"
        ></button>
        <nav class="site-nav" aria-label="">
          <ul id="nav-list"></ul>
        </nav>
        <div
          id="lang-switch"
          class="lang-switch"
          role="group"
          aria-label=""
        ></div>
      </div>
    </header>

    <main>
      <section id="philosophy" class="content-section">
        <header class="section-header">
          <h2 id="philosophy-title"></h2>
        </header>
        <div id="philosophy-grid" class="philosophy-grid"></div>
      </section>

      <section id="videos" class="content-section">
        <header class="section-header">
          <h2 id="videos-title"></h2>
        </header>
        <div id="videos-grid" class="media-grid"></div>
      </section>

      <section id="games" class="content-section">
        <header class="section-header">
          <h2 id="games-title"></h2>
        </header>
        <div id="games-grid" class="media-grid"></div>
      </section>

      <section id="photography" class="content-section">
        <header class="section-header">
          <h2 id="photography-title"></h2>
        </header>
        <div id="photography-grid" class="media-grid"></div>
      </section>

      <section id="partners" class="content-section">
        <header class="section-header">
          <h2 id="partners-title"></h2>
        </header>
        <div id="partners-grid" class="partner-masonry"></div>
      </section>

      <section id="contact" class="content-section">
        <header class="section-header">
          <h2 id="contact-title"></h2>
        </header>
        <div class="contact-panel">
          <img id="line-qr" class="line-qr" alt="" />
          <div class="contact-links">
            <a
              id="line-link"
              class="contact-link"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
            <a id="email-link" class="contact-link"></a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footer-text"></p>
    </footer>

    <div id="modal" class="modal" hidden>
      <div class="modal-scrim" data-action="close-modal"></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button
          id="modal-close"
          class="modal-close"
          type="button"
          data-action="close-modal"
          aria-label=""
        ></button>
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="../main.js" defer></script>
  </body>
</html>
