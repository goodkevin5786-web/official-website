    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="assets/logo.ico" />
    <link rel="stylesheet" href="style.css" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "GoodSon Studio",
        "alternateName": "乖哥工作室",
        "url": "https://goodson0706.com/",
        "logo": "https://goodson0706.com/assets/logo_transparent.png",
        "email": "goodwork0706@gmail.com",
        "description": "專注電競內容創作：長短影片、遊戲評測、靜態圖文與品牌合作。",
        "sameAs": [
          "https://www.youtube.com/@goodson0706",
          "https://www.instagram.com/goodson0706/",
          "https://www.facebook.com/GoodSon0706",
          "https://www.tiktok.com/@goodson0706",
          "https://www.twitch.tv/goodson0706"
        ]
      }
    </script>
  </head>
  <body
    data-page="home"
    data-root-path="./"
    data-settings-path="./setting.json"
  >
    <header class="site-header">
      <a id="brand-link" class="brand" href="./"></a>
      <div class="site-header-actions">
        <button
          id="menu-toggle"
          class="menu-toggle"
          type="button"
          data-action="toggle-menu"
          aria-label=""
          aria-expanded="false"
          aria-controls="nav-list"
        ></button>
        <nav class="site-nav" aria-label="">
          <ul id="nav-list"></ul>
        </nav>
        <div
          id="lang-switch"
          class="lang-switch"
          role="group"
          aria-label=""
        ></div>
      </div>
    </header>

    <section id="home" class="hero">
      <video
        id="hero-video"
        class="hero-video"
        autoplay
        muted
        loop
        playsinline
        aria-hidden="true"
      ></video>
      <div class="hero-overlay"></div>
      <div class="hero-content">
        <img id="hero-logo" class="hero-logo" alt="" />
        <h1 id="hero-headline"></h1>
        <p id="hero-description"></p>
        <span id="scroll-hint" class="scroll-hint"></span>
      </div>
    </section>

    <main>
      <section id="philosophy" class="content-section">
        <header class="section-header">
          <h2 id="philosophy-title"></h2>
        </header>
        <div id="philosophy-grid" class="philosophy-grid"></div>
      </section>

      <section id="videos" class="content-section">
        <header class="section-header">
          <h2 id="videos-title"></h2>
        </header>
        <div id="videos-grid" class="media-grid"></div>
      </section>

      <section id="games" class="content-section">
        <header class="section-header">
          <h2 id="games-title"></h2>
        </header>
        <div id="games-grid" class="media-grid"></div>
      </section>

      <section id="photography" class="content-section">
        <header class="section-header">
          <h2 id="photography-title"></h2>
        </header>
        <div id="photography-grid" class="media-grid"></div>
      </section>

      <section id="partners" class="content-section">
        <header class="section-header">
          <h2 id="partners-title"></h2>
        </header>
        <div id="partners-grid" class="partner-masonry"></div>
      </section>

      <section id="contact" class="content-section">
        <header class="section-header">
          <h2 id="contact-title"></h2>
        </header>
        <div class="contact-panel">
          <img id="line-qr" class="line-qr" alt="" />
          <div class="contact-links">
            <a
              id="line-link"
              class="contact-link"
              target="_blank"
              rel="noopener noreferrer"
            ></a>
            <a id="email-link" class="contact-link"></a>
          </div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <p id="footer-text"></p>
    </footer>

    <div id="modal" class="modal" hidden>
      <div class="modal-scrim" data-action="close-modal"></div>
      <div
        class="modal-dialog"
        role="dialog"
        aria-modal="true"
        aria-labelledby="modal-title"
      >
        <button
          id="modal-close"
          class="modal-close"
          type="button"
          data-action="close-modal"
          aria-label=""
        ></button>
        <h3 id="modal-title"></h3>
        <div id="modal-body"></div>
      </div>
    </div>

    <script src="main.js" defer></script>
  </body>
</html>
